<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snooker - Register</title>

    <style>
        body{
            font-family:Arial;
            background:#0b6623;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:12px;
            width:320px;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#006400;
        }

        a{
            text-decoration:none;
            color:blue;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form action="/register" method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

<br>

Already have an account?

<br><br>

<a href="/login">
Login Here
</a>

</div>

</body>
</html>
