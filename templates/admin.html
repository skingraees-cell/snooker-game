<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snooker Admin</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#0b6623;
            margin:0;
            padding:20px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        h1{
            text-align:center;
            color:#0b6623;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:#0b6623;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        .btn{
            display:inline-block;
            padding:10px 16px;
            background:#0b6623;
            color:white;
            text-decoration:none;
            border-radius:5px;
            margin-top:20px;
        }

        .btn:hover{
            background:#084d19;
        }
    </style>
</head>
<body>

<div class="container">

<h1>🎱 Snooker Admin Panel</h1>

<table>

<tr>
    <th>ID</th>
    <th>Email</th>
    <th>Password</th>
</tr>

{% for user in users %}
<tr>
    <td>{{ user[0] }}</td>
    <td>{{ user[1] }}</td>
    <td>{{ user[2] }}</td>
</tr>
{% endfor %}

</table>

<a href="/lobby" class="btn">Back to Lobby</a>

</div>

</body>
</html>
